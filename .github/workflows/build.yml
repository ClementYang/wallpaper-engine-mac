name: Build App
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          # 這裡直接寫死並用引號包裹帶有空格的正確 Scheme 名稱
          xcodebuild -project "./Open Wallpaper Engine.xcodeproj" -scheme "Open Wallpaper Engine" -configuration Release -derivedDataPath build_output

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: Open-Wallpaper-Engine-App
          path: build_output/Build/Products/Release/


